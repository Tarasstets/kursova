<div class="page-card">
  <h1>Аналітика</h1>

  <div class="stats-grid">
    <div class="stat-box">
      <h3>Усього задач</h3>
      <p>{{ totalTasks }}</p>
    </div>

    <div class="stat-box">
      <h3>Активні</h3>
      <p>{{ activeTasks }}</p>
    </div>

    <div class="stat-box">
      <h3>Виконані</h3>
      <p>{{ completedTasks }}</p>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <h3>Розподіл задач за категоріями</h3>
      <canvas baseChart [data]="pieChartData" [type]="pieChartType"> </canvas>
    </div>

    <div class="chart-box">
      <h3>Активні та виконані задачі</h3>
      <canvas baseChart [data]="barChartData" [type]="barChartType"> </canvas>
    </div>
  </div>
</div>
