<div class="settings-page">
  <h2>Settings</h2>

  <div class="settings-card">
    <h3>User Data</h3>
    <p><strong>Login:</strong> {{ currentUser?.username || 'Немає login' }}</p>
    <p><strong>Email:</strong> {{ currentUser?.email || 'Немає email' }}</p>
    <p><strong>Role:</strong> {{ currentUser?.role || 'Немає role' }}</p>
    <p><strong>Team:</strong> {{ currentUser?.team || 'Немає team' }}</p>
  </div>

  <div class="settings-card">
    <h3>Settings</h3>

    <div class="toggle-row">
      <span>Dark Mode</span>
      <label class="switch">
        <input type="checkbox" [checked]="isDarkMode" (change)="toggleDarkMode($event)" />
        <span class="slider"></span>
      </label>
    </div>
  </div>
</div>
