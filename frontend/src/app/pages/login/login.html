<div class="login-page">
  <div class="login-card">
    <h1>Вхід у систему</h1>

    <input type="text" placeholder="Логін" [(ngModel)]="username" />

    <input type="password" placeholder="Пароль" [(ngModel)]="password" />

    <button (click)="onLogin()">Увійти</button>
    <p class="auth-text">
      Немає акаунта?
      <span class="auth-link" (click)="goToRegister()"> Зареєструватись </span>
    </p>
    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
  </div>
</div>
