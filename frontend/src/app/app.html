@if (authService.isLoggedIn()) {
  <div class="layout">
    <aside class="sidebar">
      <h2>Productivity</h2>

      <nav class="nav">
        <a routerLink="/tasks" routerLinkActive="active">Задачі</a>
        <a routerLink="/analytics" routerLinkActive="active">Аналітика</a>

        @if (user?.role === 'admin') {
          <a routerLink="/admin" routerLinkActive="active">Адмін-панель</a>
        }
        <a routerLink="/settings" routerLinkActive="active">⚙ Налаштування</a>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" (click)="logout()">Вийти</button>

        <div class="user-icon" routerLink="/settings">👤</div>
      </div>
    </aside>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}
